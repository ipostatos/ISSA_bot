name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile all modules
        run: python -m py_compile bot.py calc.py content.py glossary.py marine.py nav_tasks.py tides.py

      - name: Nav-tasks unit tests (incl. 0/360 boundary)
        run: python test_nav.py

      - name: TVMDC calculator tests
        run: python test_calc.py

      - name: Marine calc tests (S-D-T, ETA, practical tasks)
        run: python test_marine.py

      - name: Tides tests (rule of twelfths)
        run: python test_tides.py

      - name: Mini App quiz-result parser tests
        run: python test_webapp.py

      - name: Quiz data is up to date with questions.json
        run: |
          python webapp/build_quiz_data.py
          if ! git diff --quiet -- webapp/quiz_data.js; then
            echo "::error::webapp/quiz_data.js устарел — перегенерируй: python webapp/build_quiz_data.py"
            git --no-pager diff --stat -- webapp/quiz_data.js
            exit 1
          fi
          echo "OK: quiz_data.js актуален"

      - name: Konspekt data is up to date with content.py
        run: |
          python webapp/build_konspekt_data.py
          if ! git diff --quiet -- webapp/konspekt_data.js; then
            echo "::error::webapp/konspekt_data.js устарел — перегенерируй: python webapp/build_konspekt_data.py"
            git --no-pager diff --stat -- webapp/konspekt_data.js
            exit 1
          fi
          echo "OK: konspekt_data.js актуален"

      - name: Tasks data is up to date with marine.py/tides.py
        run: |
          python webapp/build_tasks_data.py
          if ! git diff --quiet -- webapp/tasks_data.js; then
            echo "::error::webapp/tasks_data.js устарел — перегенерируй: python webapp/build_tasks_data.py"
            git --no-pager diff --stat -- webapp/tasks_data.js
            exit 1
          fi
          echo "OK: tasks_data.js актуален"

      - name: Glossary data is up to date with glossary.py
        run: |
          python webapp/build_glossary_data.py
          if ! git diff --quiet -- webapp/glossary_data.js; then
            echo "::error::webapp/glossary_data.js устарел — перегенерируй: python webapp/build_glossary_data.py"
            git --no-pager diff --stat -- webapp/glossary_data.js
            exit 1
          fi
          echo "OK: glossary_data.js актуален"

      - name: Pre-release audit (questions, images, limits)
        run: python run_audit.py

      - name: Concurrency / load test (10 users)
        run: python test_load.py

      - name: Mini App JS checks (math + quiz + konspekt + tides + tasks)
        run: |
          node webapp/_solver_check.mjs
          node webapp/_marine_check.mjs
          node webapp/_tide_check.mjs
          node webapp/_quiz_check.mjs
          node webapp/_konspekt_check.mjs
          node webapp/_tasks_check.mjs
          node webapp/_glossary_check.mjs

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for leaked Telegram bot tokens
        run: |
          # Токен бота: <digits>:<35 base64-символов>. Ищем по всему репо.
          if grep -REn '[0-9]{8,10}:[A-Za-z0-9_-]{35}' \
               --include='*.py' --include='*.json' --include='*.md' \
               --include='*.txt' --include='*.yml' . ; then
            echo "::error::Похоже на токен Telegram в репозитории!"
            exit 1
          fi
          echo "OK: токенов не найдено"

      - name: Ensure .env is gitignored
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "::error::.env закоммичен — должен быть в .gitignore!"
            exit 1
          fi
          echo "OK: .env не в репозитории"
