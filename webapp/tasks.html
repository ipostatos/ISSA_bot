<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Задачки ISSA</title>
<link rel="stylesheet" href="theme.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="nav.js"></script>
<script src="icons.js"></script>
<script src="tasks_data.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #17212b);
    --text: var(--tg-theme-text-color, #fff);
    --hint: var(--tg-theme-hint-color, #8a9aa9);
    --card: var(--tg-theme-secondary-bg-color, #232e3c);
    --accent: var(--tg-theme-button-color, #50a8eb);
    --accent-text: var(--tg-theme-button-text-color, #fff);
    --border: rgba(255,255,255,.10);
    --ok:#4caf72; --bad:#e5544b;
  }
  /* Светлый системный режим: если Telegram НЕ передал тему (--tg-theme-*),
     берём светлый fallback, а не тёмный (иначе белый текст на белом фоне). */
  @media (prefers-color-scheme: light){
    :root{
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #1a1a1a);
      --hint: var(--tg-theme-hint-color, #7d8a99);
      --card: var(--tg-theme-secondary-bg-color, #f1f3f5);
      --accent: var(--tg-theme-button-color, #3390ec);
      --accent-text: var(--tg-theme-button-text-color, #ffffff);
      --border: rgba(0,0,0,.10);
    }
  }
  *{box-sizing:border-box}
  body{margin:0; padding:16px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); -webkit-tap-highlight-color:transparent; line-height:1.5}
  h1{font-size:19px; margin:0 0 2px}
  .bar{display:flex; justify-content:space-between; color:var(--hint); font-size:13px; margin-bottom:14px}
  .seg{display:flex; gap:8px; margin-bottom:14px}
  .seg button{flex:1; padding:9px; border:1px solid var(--border); background:transparent;
    color:var(--text); border-radius:10px; font-size:13px; cursor:pointer}
  .seg button.active{background:var(--accent); color:var(--accent-text); border-color:var(--accent)}
  .card{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px}
  .q{font-size:16px; font-weight:600}
  .ans{display:flex; gap:10px; margin-top:6px}
  .ans input{flex:1; padding:12px; font-size:16px; border-radius:11px; border:1px solid var(--border);
    background:var(--bg); color:var(--text)}
  .ans input:focus{outline:none; border-color:var(--accent)}
  .btn{padding:12px 16px; border:none; border-radius:11px; background:var(--accent);
    color:var(--accent-text); font-weight:600; cursor:pointer; font-size:15px}
  .ghost{background:transparent; color:var(--text); border:1px solid var(--border)}
  .row{display:flex; gap:8px; margin-top:10px}
  .row .btn{flex:1}
  .fb{margin-top:12px; padding:12px; border-radius:11px; font-size:14px; display:none}
  .fb.ok{display:block; background:rgba(76,175,114,.15); border:1px solid var(--ok)}
  .fb.bad{display:block; background:rgba(229,84,75,.15); border:1px solid var(--bad)}
  .sol{margin-top:10px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px;
    white-space:pre-wrap; color:var(--hint); display:none}
  .sol.show{display:block}
  .foot{color:var(--hint); font-size:11px; text-align:center; margin-top:18px}
</style>
</head>
<body>
  <h1><span class="emi" data-icon="clipboard-list"></span> Задачки</h1>
  <div class="bar">
    <span id="cat">Навигация и приливы</span>
    <span id="streak"><span class="emi" data-icon="flame"></span> серия: 0</span>
  </div>

  <div class="seg" id="cats">
    <button data-c="all" class="active">Все</button>
    <button data-c="nav"><span class="emi" data-icon="clock"></span> Скорость/ETA</button>
    <button data-c="tide"><span class="emi" data-icon="waves"></span> Прилив</button>
  </div>

  <div class="card">
    <div class="q" id="q">…</div>
    <div class="ans">
      <input id="inp" type="text" inputmode="decimal" placeholder="ответ числом" autocomplete="off">
      <button class="btn" id="check">OK</button>
    </div>
    <div class="fb" id="fb"></div>
    <div class="sol" id="sol"></div>
    <div class="row">
      <button class="btn ghost" id="solveBtn"><span class="emi" data-icon="lightbulb"></span> Решение</button>
      <button class="btn" id="next">Новая →</button>
    </div>
  </div>

  <p class="foot">Учебный тренажёр. Не является официальным материалом ISSA.</p>

<script>
"use strict";
const tg = window.Telegram?.WebApp;
if (tg){ tg.ready(); tg.expand(); }

const ALL = (window.TASKS_DATA && window.TASKS_DATA.tasks) || [];
const $ = id => document.getElementById(id);

let CAT = "all", cur = null, streak = 0;
try { streak = parseInt(localStorage.getItem("issa_task_streak") || "0", 10) || 0; } catch(e){}
const FLAME = window.Icons ? Icons.svg("flame") : "";
$("streak").innerHTML = `${FLAME} серия: ${streak}`;

function pool(){ return CAT === "all" ? ALL : ALL.filter(t => t.cat === CAT); }

function pick(){
  const p = pool();
  if (!p.length){
    cur = null;
    $("q").textContent = ALL.length
      ? "В этой категории задач нет."
      : "Не удалось загрузить задачи (tasks_data.js не найден). Запусти на сервере deploy/update_webapp.sh.";
    $("sol").textContent = "";
    return;
  }
  cur = p[Math.floor(Math.random() * p.length)];
  $("q").textContent = cur.text;
  $("inp").value = "";
  $("fb").className = "fb"; $("fb").textContent = "";
  $("sol").className = "sol"; $("sol").textContent = cur.solution;
  $("inp").focus();
}

function fmt(x){ return String(Math.round(x*100)/100).replace(".", ","); }

function check(){
  if (!cur) return;
  const raw = $("inp").value.trim().replace(",", ".")
                .replace("ч","").replace("м","").replace("h","").trim();
  const val = parseFloat(raw);
  const fb = $("fb");
  if (Number.isNaN(val)){ fb.className = "fb bad"; fb.textContent = "Введи ответ числом."; return; }
  const ok = Math.abs(val - cur.answer) <= cur.tol + 1e-9;
  if (ok){
    streak++; fb.className = "fb ok";
    fb.innerHTML = `${window.Icons?Icons.svg("check-circle"):""} Верно! Ответ ${fmt(cur.answer)} ${cur.unit}.`;
    haptic("success");
  } else {
    streak = 0; fb.className = "fb bad";
    fb.innerHTML = `${window.Icons?Icons.svg("x-circle"):""} Не то. Нажми «Решение» и попробуй разобраться.`;
    haptic("error");
  }
  try { localStorage.setItem("issa_task_streak", String(streak)); } catch(e){}
  $("streak").innerHTML = `${FLAME} серия: ${streak}`;
}

$("check").onclick = check;
$("inp").addEventListener("keydown", e => { if (e.key === "Enter") check(); });
$("solveBtn").onclick = () => $("sol").classList.toggle("show");
$("next").onclick = pick;

$("cats").addEventListener("click", e => {
  const b = e.target.closest("button"); if(!b) return;
  [...e.currentTarget.children].forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); CAT = b.dataset.c; pick();
});

pick();

if (window.Icons) Icons.hydrate();
</script>
</body>
</html>
