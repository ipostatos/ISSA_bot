<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Профиль</title>
<link rel="stylesheet" href="theme.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="nav.js"></script>
<script src="icons.js"></script>
<script src="quiz_data.js"></script>
<script src="srs.js"></script>
<script src="progress.js"></script>
<script src="badges.js"></script>
<script src="sync.js"></script>
<style>
  .phead{ display:flex; align-items:center; gap:14px; margin-bottom:16px }
  .phead .rank{ width:64px; height:64px; border-radius:50%; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; font-size:30px;
    background:color-mix(in srgb, var(--accent) 18%, transparent) }
  .pstats{ display:flex; gap:10px; margin-bottom:18px }
  .pstats .s{ flex:1; text-align:center; padding:12px 8px; background:var(--card);
    border:1px solid var(--border); border-radius:14px }
  .pstats .n{ font-size:20px; font-weight:800 }
  .pstats .c{ font-size:11px; color:var(--hint); margin-top:2px }
  .bgrid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px 8px; margin-top:4px }
  .emi{ display:inline-flex; vertical-align:-2px } .emi svg{ width:1em; height:1em }
</style>
</head>
<body>
  <div class="phead">
    <div class="rank emi" id="rankIcon" data-icon="anchor"></div>
    <div style="flex:1; min-width:0">
      <div class="h1" id="rankTitle" style="font-size:20px">Профиль</div>
      <div class="muted" style="font-size:13px" id="rankSub">—</div>
    </div>
  </div>

  <div class="pstats">
    <div class="s"><div class="n" id="stReady">0%</div><div class="c">готовность</div></div>
    <div class="s"><div class="n" id="stStreak">0</div><div class="c">серия <span class="emi" data-icon="flame"></span></div></div>
    <div class="s"><div class="n" id="stBadges">0</div><div class="c">бейджей</div></div>
  </div>

  <div class="h2">Достижения</div>
  <div class="bgrid" id="badges"></div>

  <p class="foot">Достижения считаются из вашей активности на этом устройстве
    и синхронизируются между устройствами.</p>

<script>
"use strict";
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

// эмодзи бейджа/звания → доступная SVG-иконка (если Icons загружен)
function badgeIcon(emoji){
  const m = {
    "⚓":"anchor", "🧭":"compass", "🚢":"ship", "🔥":"flame", "🌊":"waves",
    "💡":"lightbulb", "📍":"map-pin", "🗺️":"map", "🎖️":"medal",
    "🧑‍✈️":"ship-wheel", "⭐":"star", "🌙":"moon"
  };
  return (window.Icons && m[emoji]) ? Icons.svg(m[emoji]) : esc(emoji);
}

// звание по числу открытых бейджей
function rankFor(n, total){
  const p = total ? n/total : 0;
  if (p >= 1)   return { icon:"🧑‍✈️", title:"Капитан" };
  if (p >= 0.7) return { icon:"🎖️", title:"Шкипер" };
  if (p >= 0.4) return { icon:"🧭", title:"Штурман" };
  if (p >= 0.15)return { icon:"🚢", title:"Матрос" };
  return { icon:"⚓", title:"Юнга" };
}

function render(){
  if (!window.Badges){ return; }
  const m = Badges.computeMetrics();
  const list = Badges.list(m);
  const unlocked = list.filter(b=>b.unlocked).length;

  const r = rankFor(unlocked, list.length);
  $("rankIcon").innerHTML = badgeIcon(r.icon);
  $("rankTitle").textContent = r.title;
  $("rankSub").textContent = `Открыто ${unlocked} из ${list.length} достижений`;

  $("stReady").textContent = m.ready + "%";
  $("stStreak").textContent = m.streak;
  $("stBadges").textContent = unlocked;

  $("badges").innerHTML = list.map(b => `
    <div class="badge ${b.unlocked ? b.tier : "locked"}">
      <div class="medal">${badgeIcon(b.icon)}</div>
      <div class="bt">${esc(b.title)}</div>
      <div class="bd">${esc(b.desc)}</div>
      ${b.unlocked ? "" :
        `<div class="bprog"><i style="width:${Math.round(b.progress*100)}%"></i></div>`}
    </div>`).join("");
}

if (window.Icons) Icons.hydrate();
render();
// подтянуть прогресс с других устройств и перерисовать
if (window.Sync && Sync.enabled){
  Sync.pull().then(function(changed){ if (changed) render(); });
}
</script>
</body>
</html>
