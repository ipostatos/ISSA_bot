<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Калькулятор TVMDC</title>
<link rel="stylesheet" href="theme.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="nav.js"></script>
<script src="icons.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #17212b);
    --text: var(--tg-theme-text-color, #fff);
    --hint: var(--tg-theme-hint-color, #8a9aa9);
    --card: var(--tg-theme-secondary-bg-color, #232e3c);
    --accent: var(--tg-theme-button-color, #50a8eb);
    --accent-text: var(--tg-theme-button-text-color, #fff);
    --border: rgba(255,255,255,.10);
  }
  /* Светлый системный режим: если Telegram НЕ передал тему (--tg-theme-*),
     берём светлый fallback, а не тёмный (иначе белый текст на белом фоне). */
  @media (prefers-color-scheme: light){
    :root{
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #1a1a1a);
      --hint: var(--tg-theme-hint-color, #7d8a99);
      --card: var(--tg-theme-secondary-bg-color, #f1f3f5);
      --accent: var(--tg-theme-button-color, #3390ec);
      --accent-text: var(--tg-theme-button-text-color, #ffffff);
      --border: rgba(0,0,0,.10);
    }
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:16px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text);
    -webkit-tap-highlight-color:transparent;
  }
  h1{font-size:18px; margin:0 0 4px}
  .sub{color:var(--hint); font-size:13px; margin:0 0 16px}
  .card{background:var(--card); border-radius:14px; padding:14px; margin-bottom:14px}
  label{display:block; font-size:13px; color:var(--hint); margin:0 0 6px}
  .seg{display:flex; gap:6px; flex-wrap:wrap}
  .seg button{
    flex:1 1 30%; padding:9px 6px; border:1px solid var(--border);
    background:transparent; color:var(--text); border-radius:10px;
    font-size:13px; cursor:pointer; transition:.12s;
  }
  .seg button.active{background:var(--accent); color:var(--accent-text); border-color:var(--accent)}
  .row{display:flex; gap:10px; align-items:flex-end; margin-bottom:12px}
  .row:last-child{margin-bottom:0}
  .field{flex:1}
  input[type=number]{
    width:100%; padding:11px; font-size:17px; border-radius:10px;
    border:1px solid var(--border); background:var(--bg); color:var(--text);
  }
  input:focus{outline:none; border-color:var(--accent)}
  .ew{display:flex; gap:6px}
  .ew button{
    width:46px; padding:11px 0; border:1px solid var(--border); background:transparent;
    color:var(--text); border-radius:10px; font-weight:600; cursor:pointer;
  }
  .ew button.active{background:var(--accent); color:var(--accent-text); border-color:var(--accent)}
  .hidden{display:none}
  .go{
    width:100%; padding:14px; font-size:16px; font-weight:600; border:none;
    border-radius:12px; background:var(--accent); color:var(--accent-text); cursor:pointer;
  }
  .result{margin-top:14px}
  .answer{font-size:34px; font-weight:700; text-align:center; margin:4px 0 2px}
  .answer small{font-size:15px; color:var(--hint); font-weight:500}
  .steps{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace; font-size:13px;
    color:var(--text); white-space:pre-wrap; line-height:1.6; margin-top:8px}
  .rule{color:var(--hint); font-size:12px; margin-top:10px; font-style:italic}
  .err{color:#ff6b6b; font-size:13px; margin-top:8px}
  .foot{color:var(--hint); font-size:11px; text-align:center; margin-top:18px}
  .emi{display:inline-flex; vertical-align:-2px} .emi svg{width:1em;height:1em}
</style>
</head>
<body>
  <h1><span class="emi" data-icon="calculator"></span> Морской калькулятор</h1>

  <div class="seg" id="tabs" style="margin-bottom:14px">
    <button data-tab="compass" class="active"><span class="emi" data-icon="compass"></span> Поправки</button>
    <button data-tab="marine"><span class="emi" data-icon="clock"></span> Время</button>
    <button data-tab="tide"><span class="emi" data-icon="waves"></span> Прилив</button>
  </div>

  <div id="panel-compass">
  <p class="sub">True ↔ Variation ↔ Magnetic ↔ Deviation ↔ Compass</p>

  <div class="card">
    <label>Что во что пересчитать</label>
    <div class="seg" id="dirs">
      <button data-s="T" data-d="C">True → Compass</button>
      <button data-s="C" data-d="T">Compass → True</button>
      <button data-s="T" data-d="M">True → Magnetic</button>
      <button data-s="M" data-d="T">Magnetic → True</button>
      <button data-s="M" data-d="C">Magnetic → Compass</button>
      <button data-s="C" data-d="M">Compass → Magnetic</button>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <div class="field">
        <label id="courseLabel">Курс (°)</label>
        <input id="course" type="number" inputmode="decimal" min="0" max="360" placeholder="045">
      </div>
    </div>
    <div class="row" id="varRow">
      <div class="field">
        <label>Variation (°)</label>
        <input id="var" type="number" inputmode="decimal" min="0" placeholder="3">
      </div>
      <div class="ew" id="varEW">
        <button data-v="E">E</button><button data-v="W" class="active">W</button>
      </div>
    </div>
    <div class="row" id="devRow">
      <div class="field">
        <label>Deviation (°)</label>
        <input id="dev" type="number" inputmode="decimal" min="0" placeholder="2">
      </div>
      <div class="ew" id="devEW">
        <button data-v="E" class="active">E</button><button data-v="W">W</button>
      </div>
    </div>
  </div>

  <button class="go" id="go">Рассчитать</button>

  <div class="card result hidden" id="resultCard">
    <div class="answer" id="answer"></div>
    <div class="steps" id="steps"></div>
    <div class="rule" id="rule"></div>
  </div>
  <div class="err hidden" id="error"></div>
  </div><!-- /panel-compass -->

  <div id="panel-marine" class="hidden">
    <div class="card">
      <label>Что посчитать</label>
      <div class="seg" id="mkinds">
        <button data-k="t" class="active"><span class="emi" data-icon="clock"></span> Время</button>
        <button data-k="d"><span class="emi" data-icon="map"></span> Дистанция</button>
        <button data-k="v"><span class="emi" data-icon="gauge"></span> Скорость</button>
        <button data-k="e"><span class="emi" data-icon="target"></span> ETA</button>
      </div>
    </div>
    <div class="card">
      <div class="row"><div class="field">
        <label id="mLabelA">Скорость (узлы)</label>
        <input id="mA" type="number" inputmode="decimal" min="0" placeholder="5.5">
      </div></div>
      <div class="row"><div class="field">
        <label id="mLabelB">Дистанция (NM)</label>
        <input id="mB" type="number" inputmode="decimal" min="0" placeholder="13.2">
      </div></div>
      <div class="row hidden" id="mRowRes"><div class="field">
        <label>Запас, %</label>
        <input id="mRes" type="number" inputmode="decimal" min="0" placeholder="20">
      </div></div>
      <div class="row hidden" id="mRowStart"><div class="field">
        <label>Время старта (ЧЧ:ММ)</label>
        <input id="mStart" type="text" inputmode="numeric" placeholder="09:00">
      </div></div>
    </div>
    <button class="go" id="mGo">Рассчитать</button>
    <div class="card result hidden" id="mResultCard">
      <div class="answer" id="mAnswer"></div>
      <div class="steps" id="mSteps"></div>
    </div>
    <div class="err hidden" id="mError"></div>
  </div><!-- /panel-marine -->

  <div id="panel-tide" class="hidden">
    <p class="sub">Правило двенадцатых: 1–2–3–3–2–1 за 6 часов</p>
    <div class="card">
      <div class="row">
        <div class="field">
          <label>Малая вода LW (м)</label>
          <input id="tLw" type="number" inputmode="decimal" placeholder="2">
        </div>
        <div class="field">
          <label>Полная вода HW (м)</label>
          <input id="tHw" type="number" inputmode="decimal" placeholder="8">
        </div>
      </div>
      <div class="row"><div class="field">
        <label>Часов после малой воды (0–6)</label>
        <input id="tH" type="number" inputmode="decimal" min="0" max="6" step="0.5" placeholder="3.5">
      </div></div>
    </div>
    <button class="go" id="tGo">Рассчитать</button>
    <div class="card result hidden" id="tResultCard">
      <div class="answer" id="tAnswer"></div>
      <canvas id="tChart" width="320" height="180" style="width:100%;height:auto;margin-top:6px"></canvas>
      <div class="steps" id="tSteps"></div>
    </div>
    <div class="err hidden" id="tError"></div>
  </div><!-- /panel-tide -->

  <p class="foot">Учебный инструмент. Не является официальным материалом ISSA.</p>

<script>
"use strict";
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Та же математика, что в nav_tasks.py / calc.py ──
// Вниз (True→Compass): East −, West +.  Вверх — наоборот.
const POINTS = ["T","M","C"];
const NAME = {T:"True", M:"Magnetic", C:"Compass"};
const norm360 = x => ((x % 360) + 360) % 360;

function step(a, b, cur, val, dir, down){
  // знак применения к величине курса
  let appliedSign;
  if (down) appliedSign = (dir === "E") ? -1 : +1;
  else      appliedSign = (dir === "E") ? +1 : -1;
  const res = norm360(cur + appliedSign * val);
  const shown = (appliedSign < 0) ? "−" : "+";
  return {
    label: `${NAME[a]}→${NAME[b]}`,
    text: `${NAME[a]}→${NAME[b]}: ${Math.round(cur)} ${shown} ${Math.round(val)}${dir} = ${Math.round(res)}`,
    result: res
  };
}

function solve(src, dst, course, vr, vrDir, dv, dvDir){
  const i = POINTS.indexOf(src), j = POINTS.indexOf(dst);
  const down = j > i;
  let cur = norm360(course);
  const order = [];
  if (down) for (let k=i; k<j; k++) order.push([POINTS[k], POINTS[k+1]]);
  else      for (let k=i; k>j; k--) order.push([POINTS[k], POINTS[k-1]]);
  const steps = [];
  for (const [a,b] of order){
    const isVar = (a+b).includes("T"); // T↔M => Variation, M↔C => Deviation
    const val = isVar ? vr : dv;
    const dir = isVar ? vrDir : dvDir;
    const s = step(a, b, cur, val, dir, down);
    steps.push(s);
    cur = s.result;
  }
  return { answer: Math.round(cur), from: NAME[src], to: NAME[dst],
           direction: down ? "down" : "up", steps };
}

function ruleHint(direction){
  return direction === "down"
    ? "Правило (вниз, True→Compass): East вычитаем (−), West прибавляем (+)."
    : "Правило (вверх, Compass→True): East прибавляем (+), West вычитаем (−).";
}

// ── UI ──
let SRC = "T", DST = "C", VDIR = "W", DDIR = "E";

const dirsBox = document.getElementById("dirs");
[...dirsBox.children][0].classList.add("active");

function pair(){ return new Set([SRC, DST]); }
function needVar(){ const p=pair(); return (p.has("T")&&p.has("M"))||(p.has("T")&&p.has("C")); }
function needDev(){ const p=pair(); return (p.has("M")&&p.has("C"))||(p.has("T")&&p.has("C")); }

function syncFields(){
  document.getElementById("varRow").classList.toggle("hidden", !needVar());
  document.getElementById("devRow").classList.toggle("hidden", !needDev());
  document.getElementById("courseLabel").textContent = `Курс ${NAME[SRC]} (°)`;
}

dirsBox.addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  [...dirsBox.children].forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  SRC = b.dataset.s; DST = b.dataset.d;
  syncFields();
});

function bindEW(boxId, set){
  const box = document.getElementById(boxId);
  box.addEventListener("click", e => {
    const b = e.target.closest("button"); if (!b) return;
    [...box.children].forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    set(b.dataset.v);
  });
}
bindEW("varEW", v => VDIR = v);
bindEW("devEW", v => DDIR = v);

function showError(msg){
  const e = document.getElementById("error");
  e.textContent = "⚠️ " + msg; e.classList.remove("hidden");
  document.getElementById("resultCard").classList.add("hidden");
}

document.getElementById("go").addEventListener("click", () => {
  document.getElementById("error").classList.add("hidden");
  const course = parseFloat(document.getElementById("course").value);
  if (Number.isNaN(course)) return showError("Введите курс.");
  const vr = needVar() ? parseFloat(document.getElementById("var").value) : 0;
  const dv = needDev() ? parseFloat(document.getElementById("dev").value) : 0;
  if (needVar() && Number.isNaN(vr)) return showError("Введите Variation.");
  if (needDev() && Number.isNaN(dv)) return showError("Введите Deviation.");

  const res = solve(SRC, DST, course, Math.abs(vr||0), VDIR, Math.abs(dv||0), DDIR);
  const pad = String(res.answer).padStart(3, "0");
  document.getElementById("answer").innerHTML =
    `${res.from} → ${res.to}<br>${pad}° <small>(CC/MC/TC)</small>`;
  document.getElementById("steps").textContent = res.steps.map(s => s.text).join("\n");
  document.getElementById("rule").textContent = ruleHint(res.direction);
  document.getElementById("resultCard").classList.remove("hidden");
  haptic("success");
});

syncFields();

// ───────────────────── Раздел «Скорость · время · ETA» ─────────────────────
// Та же арифметика, что marine.py.
function numFmt(x){ return String(Math.round(x*100)/100).replace(".", ","); }
function hoursToHM(h){ if(h<0)h=0; const t=Math.round(h*60); return `${Math.floor(t/60)} ч ${String(t%60).padStart(2,"0")} мин`; }
function etaClock(start, travelH){
  const s = String(start).trim().replace(".", ":");
  let hh, mm;
  if (s.includes(":")){ [hh,mm] = s.split(":"); }
  else if (/^\d{3,4}$/.test(s)){ hh = s.slice(0,-2); mm = s.slice(-2); }
  else return null;
  const h = parseInt(hh,10), m = parseInt(mm,10);
  if (!(h>=0&&h<24&&m>=0&&m<60)) return null;
  const arrive = ((h*60+m) + Math.round(travelH*60)) % (24*60);
  return `${String(Math.floor(arrive/60)).padStart(2,"0")}:${String(arrive%60).padStart(2,"0")}`;
}

let MKIND = "t";
const MK = {
  t: { a:["Скорость (узлы)","5.5"], b:["Дистанция (NM)","13.2"], res:false, start:false },
  d: { a:["Скорость (узлы)","6"],   b:["Время (часы)","2.5"],    res:false, start:false },
  v: { a:["Дистанция (NM)","15"],   b:["Время (часы)","3"],      res:false, start:false },
  e: { a:["Дистанция (NM)","18"],   b:["Скорость (узлы)","5"],   res:true,  start:true  },
};

function syncMarine(){
  const c = MK[MKIND];
  const A=document.getElementById("mLabelA"), B=document.getElementById("mLabelB");
  A.textContent = c.a[0]; document.getElementById("mA").placeholder = c.a[1];
  B.textContent = c.b[0]; document.getElementById("mB").placeholder = c.b[1];
  document.getElementById("mRowRes").classList.toggle("hidden", !c.res);
  document.getElementById("mRowStart").classList.toggle("hidden", !c.start);
}

document.getElementById("mkinds").addEventListener("click", e => {
  const b = e.target.closest("button"); if(!b) return;
  [...e.currentTarget.children].forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); MKIND = b.dataset.k; syncMarine();
  document.getElementById("mResultCard").classList.add("hidden");
  document.getElementById("mError").classList.add("hidden");
});

function mErr(msg){
  const e=document.getElementById("mError");
  e.textContent="⚠️ "+msg; e.classList.remove("hidden");
  document.getElementById("mResultCard").classList.add("hidden");
}

document.getElementById("mGo").addEventListener("click", () => {
  document.getElementById("mError").classList.add("hidden");
  const a = parseFloat(document.getElementById("mA").value);
  const b = parseFloat(document.getElementById("mB").value);
  if (Number.isNaN(a) || Number.isNaN(b)) return mErr("Заполни оба поля.");
  let answer="", steps="";
  if (MKIND === "t"){
    if (a<=0) return mErr("Скорость должна быть > 0.");
    const h=b/a; answer=`Время в пути: ${numFmt(h)} ч (${hoursToHM(h)})`;
    steps=`t = D / V = ${numFmt(b)} / ${numFmt(a)} = ${numFmt(h)} ч`;
  } else if (MKIND === "d"){
    const d=a*b; answer=`Дистанция: ${numFmt(d)} NM`;
    steps=`D = V × t = ${numFmt(a)} × ${numFmt(b)} = ${numFmt(d)} NM`;
  } else if (MKIND === "v"){
    if (b<=0) return mErr("Время должно быть > 0.");
    const v=a/b; answer=`Средняя скорость: ${numFmt(v)} узла`;
    steps=`V = D / t = ${numFmt(a)} / ${numFmt(b)} = ${numFmt(v)} узла`;
  } else { // e: ETA
    if (b<=0) return mErr("Скорость должна быть > 0.");
    const res=parseFloat(document.getElementById("mRes").value)||0;
    const start=document.getElementById("mStart").value.trim();
    const base=a/b, withR=base*(1+Math.max(0,res)/100);
    answer=`В пути: ${numFmt(withR)} ч (${hoursToHM(withR)})`;
    const eta = start ? etaClock(start, withR) : null;
    if (eta) answer+=`\n🕒 ETA: ${eta}`;
    steps=`t = D / V = ${numFmt(a)} / ${numFmt(b)} = ${numFmt(base)} ч`;
    if (res) steps+=`\nс запасом ${numFmt(res)}% → ${numFmt(withR)} ч`;
  }
  document.getElementById("mAnswer").textContent = answer;
  document.getElementById("mSteps").textContent = steps;
  document.getElementById("mResultCard").classList.remove("hidden");
  haptic("success");
});

syncMarine();

// ───────────────────── Раздел «Прилив» (правило двенадцатых) ─────────────────────
// Та же логика, что tides.py.
const TWELFTHS = [1,2,3,3,2,1];
function heightAfterLw(hw, lw, hours){
  const rng = hw - lw;
  let h = Math.max(0, Math.min(6, hours));
  const full = Math.floor(h), frac = h - full;
  let water = lw;
  for (let i=0; i<full; i++) water += rng*TWELFTHS[i]/12;
  if (full < 6) water += rng*TWELFTHS[full]/12*frac;
  return water;
}

function drawTide(hw, lw, mark){
  const cv = document.getElementById("tChart");
  const ctx = cv.getContext("2d");
  const W = cv.width, H = cv.height, pad = 26;
  ctx.clearRect(0,0,W,H);
  const css = getComputedStyle(document.body);
  const accent = css.getPropertyValue("--tg-theme-button-color").trim() || "#50a8eb";
  const hint = css.getPropertyValue("--tg-theme-hint-color").trim() || "#8a9aa9";
  const lo = Math.min(hw,lw), hi = Math.max(hw,lw), span = (hi-lo)||1;
  const x = h => pad + (W-2*pad) * h/6;
  const y = v => H-pad - (H-2*pad) * (v-lo)/span;
  // оси
  ctx.strokeStyle = hint; ctx.globalAlpha = .35; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad,H-pad); ctx.lineTo(W-pad,H-pad); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad,pad); ctx.lineTo(pad,H-pad); ctx.stroke();
  ctx.globalAlpha = 1;
  // ступенчатая кривая правила 12 (по 0.1ч)
  ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.beginPath();
  for (let i=0; i<=60; i++){ const h=i/10; const px=x(h), py=y(heightAfterLw(hw,lw,h)); i?ctx.lineTo(px,py):ctx.moveTo(px,py); }
  ctx.stroke();
  // подписи часов
  ctx.fillStyle = hint; ctx.font = "10px sans-serif"; ctx.textAlign = "center";
  for (let hh=0; hh<=6; hh++) ctx.fillText(hh+"ч", x(hh), H-pad+12);
  // точка-маркер на текущем времени
  if (mark != null){
    const mx=x(Math.max(0,Math.min(6,mark))), my=y(heightAfterLw(hw,lw,mark));
    ctx.fillStyle = accent; ctx.beginPath(); ctx.arc(mx,my,4,0,7); ctx.fill();
    ctx.strokeStyle = accent; ctx.globalAlpha=.4;
    ctx.beginPath(); ctx.moveTo(mx,H-pad); ctx.lineTo(mx,my); ctx.stroke(); ctx.globalAlpha=1;
  }
}

function tErr(m){ const e=document.getElementById("tError"); e.textContent="⚠️ "+m; e.classList.remove("hidden"); document.getElementById("tResultCard").classList.add("hidden"); }

document.getElementById("tGo").addEventListener("click", () => {
  document.getElementById("tError").classList.add("hidden");
  const lw = parseFloat(document.getElementById("tLw").value);
  const hw = parseFloat(document.getElementById("tHw").value);
  const h  = parseFloat(document.getElementById("tH").value);
  if (Number.isNaN(lw) || Number.isNaN(hw)) return tErr("Введи LW и HW.");
  if (Number.isNaN(h)) return tErr("Введи число часов после малой воды.");
  const rng = hw - lw;
  const water = heightAfterLw(hw, lw, h);
  const f = x => String(Math.round(x*100)/100).replace(".", ",");
  document.getElementById("tAnswer").textContent = `Высота воды: ${f(water)} м`;
  // пошаговая таблица 1-2-3-3-2-1
  let acc = lw, lines = [`Диапазон = ${f(hw)} − ${f(lw)} = ${f(rng)} м; 1/12 = ${f(rng/12)} м`];
  for (let i=0;i<6;i++){ acc += rng*TWELFTHS[i]/12; lines.push(`${i+1}ч  +${TWELFTHS[i]}/12 → ${f(acc)} м`); }
  document.getElementById("tSteps").textContent = lines.join("\n");
  document.getElementById("tResultCard").classList.remove("hidden");
  drawTide(hw, lw, h);
  haptic("success");
});

// ── переключение вкладок ──
document.getElementById("tabs").addEventListener("click", e => {
  const b = e.target.closest("button"); if(!b) return;
  [...e.currentTarget.children].forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  const tab = b.dataset.tab;
  document.getElementById("panel-compass").classList.toggle("hidden", tab!=="compass");
  document.getElementById("panel-marine").classList.toggle("hidden", tab!=="marine");
  document.getElementById("panel-tide").classList.toggle("hidden", tab!=="tide");
});

// заменить data-icon на SVG-иконки (вкладки, заголовок)
if (window.Icons) Icons.hydrate();
</script>
</body>
</html>
