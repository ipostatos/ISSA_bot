<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Конспект ISSA</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="konspekt_data.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #17212b);
    --text: var(--tg-theme-text-color, #fff);
    --hint: var(--tg-theme-hint-color, #8a9aa9);
    --card: var(--tg-theme-secondary-bg-color, #232e3c);
    --accent: var(--tg-theme-button-color, #50a8eb);
    --accent-text: var(--tg-theme-button-text-color, #fff);
    --border: rgba(255,255,255,.10);
    --mark: #ffd54a;
  }
  *{box-sizing:border-box}
  body{margin:0; padding:14px 14px 40px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); -webkit-tap-highlight-color:transparent; line-height:1.5}
  h1{font-size:19px; margin:0 0 10px}
  .search{position:sticky; top:0; z-index:5; background:var(--bg); padding-bottom:10px}
  .search input{width:100%; padding:12px 14px; font-size:15px; border-radius:12px;
    border:1px solid var(--border); background:var(--card); color:var(--text)}
  .search input:focus{outline:none; border-color:var(--accent)}
  .tiles{display:flex; flex-direction:column; gap:9px}
  .tile{display:flex; align-items:center; gap:10px; text-align:left; width:100%;
    padding:14px; border:1px solid var(--border); background:var(--card); color:var(--text);
    border-radius:13px; font-size:16px; cursor:pointer}
  .tile:active{transform:scale(.995)}
  .hidden{display:none !important}

  /* чтение темы */
  #reader article{font-size:15px}
  #reader b{color:var(--text)}
  #reader code{background:var(--card); padding:1px 5px; border-radius:5px; font-size:13px;
    font-family:ui-monospace,Menlo,Consolas,monospace}
  #reader img{width:100%; border-radius:12px; margin:12px 0; border:1px solid var(--border); background:#fff}
  .topbar{display:flex; gap:10px; align-items:center; margin-bottom:12px; position:sticky; top:0;
    background:var(--bg); padding:8px 0; z-index:5}
  .back{padding:9px 14px; border:1px solid var(--border); background:var(--card); color:var(--text);
    border-radius:10px; cursor:pointer; font-size:14px; white-space:nowrap}
  .reader-title{font-size:14px; color:var(--hint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}

  /* результаты поиска */
  .hit{display:block; width:100%; text-align:left; padding:13px; margin-bottom:9px;
    border:1px solid var(--border); background:var(--card); color:var(--text); border-radius:12px; cursor:pointer}
  .hit .ht{font-weight:700; font-size:15px; margin-bottom:4px}
  .hit .hs{font-size:13px; color:var(--hint); line-height:1.5}
  mark{background:var(--mark); color:#000; border-radius:3px; padding:0 2px}
  .empty{color:var(--hint); font-size:14px; text-align:center; padding:24px 8px}
  .foot{color:var(--hint); font-size:11px; text-align:center; margin-top:22px; line-height:1.5}
</style>
</head>
<body>

<section id="list">
  <h1>📖 Конспект</h1>
  <div class="search"><input id="q" type="search" placeholder="🔎 Поиск по конспекту…" autocomplete="off"></div>
  <div id="tiles" class="tiles"></div>
  <div id="hits" class="hidden"></div>
  <p class="foot">Учебный пересказ по открытым источникам.
    Не является официальным материалом ISSA.</p>
</section>

<section id="reader" class="hidden">
  <div class="topbar">
    <button class="back" id="back">← Темы</button>
    <span class="reader-title" id="rTitle"></span>
  </div>
  <article id="rBody"></article>
  <p class="foot">Учебный пересказ по открытым источникам.</p>
</section>

<script>
"use strict";
const tg = window.Telegram?.WebApp;
if (tg){ tg.ready(); tg.expand(); }

const DATA = (window.KONSPEKT_DATA && window.KONSPEKT_DATA.topics) || [];
const byKey = Object.fromEntries(DATA.map(t => [t.key, t]));

const $ = id => document.getElementById(id);
const show = id => $(id).classList.remove("hidden");
const hide = id => $(id).classList.add("hidden");
const escRe = s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

// Если данные не подгрузились — показываем понятное сообщение, а не пустоту.
if (!DATA.length){
  $("tiles").innerHTML =
    '<div class="empty">Не удалось загрузить конспект.<br>' +
    'Файл konspekt_data.js не найден на сервере.<br>' +
    'Запусти на сервере: <code>bash deploy/update_webapp.sh</code></div>';
}

// ── список тем ──
function renderTiles(){
  if (!DATA.length) return;
  $("tiles").innerHTML = "";
  DATA.forEach(t => {
    const b = document.createElement("button");
    b.className = "tile";
    b.textContent = t.title;
    b.onclick = () => openTopic(t.key);
    $("tiles").appendChild(b);
  });
}

// ── чтение темы ──
function openTopic(key, scrollToTerm){
  const t = byKey[key]; if (!t) return;
  let html = t.html;
  // картинки темы — после текста
  if (t.images && t.images.length){
    html += t.images.map(f => `<img src="images/${f}" alt="" loading="lazy">`).join("");
  }
  $("rBody").innerHTML = html;
  $("rTitle").textContent = t.title;
  hide("list"); show("reader");
  window.scrollTo(0, 0);
  if (scrollToTerm){
    // подсветить и проскроллить к первому вхождению искомого слова
    highlightIn($("rBody"), scrollToTerm);
    const m = $("rBody").querySelector("mark");
    if (m) m.scrollIntoView({block:"center"});
  }
}

$("back").onclick = () => { hide("reader"); show("list"); };

// ── подсветка ──
function highlightIn(root, term){
  if (!term) return;
  const re = new RegExp(escRe(term), "gi");
  const walk = node => {
    for (const child of [...node.childNodes]){
      if (child.nodeType === 3){
        const txt = child.nodeValue;
        if (re.test(txt)){
          const span = document.createElement("span");
          span.innerHTML = txt.replace(re, m => `<mark>${m}</mark>`);
          child.replaceWith(span);
        }
      } else if (child.nodeType === 1 && child.tagName !== "MARK"){
        walk(child);
      }
    }
  };
  walk(root);
}

// ── поиск ──
function snippet(text, term){
  const i = text.toLowerCase().indexOf(term.toLowerCase());
  if (i < 0) return text.slice(0, 90) + "…";
  const start = Math.max(0, i - 35);
  const end = Math.min(text.length, i + term.length + 55);
  let s = (start > 0 ? "…" : "") + text.slice(start, end) + (end < text.length ? "…" : "");
  const re = new RegExp(escRe(term), "gi");
  return s.replace(re, m => `<mark>${m}</mark>`);
}

function doSearch(q){
  q = q.trim();
  if (q.length < 2){
    show("tiles"); hide("hits"); return;
  }
  hide("tiles"); show("hits");
  const ql = q.toLowerCase();
  const found = DATA.filter(t => t.text.toLowerCase().includes(ql)
                              || t.title.toLowerCase().includes(ql));
  if (!found.length){
    $("hits").innerHTML = `<div class="empty">Ничего не найдено по «${q}».<br>Попробуй другое слово.</div>`;
    return;
  }
  $("hits").innerHTML = "";
  found.forEach(t => {
    const b = document.createElement("button");
    b.className = "hit";
    b.innerHTML = `<div class="ht">${t.title}</div><div class="hs">${snippet(t.text, q)}</div>`;
    b.onclick = () => openTopic(t.key, q);
    $("hits").appendChild(b);
  });
}

let tmr;
$("q").addEventListener("input", e => {
  clearTimeout(tmr);
  tmr = setTimeout(() => doSearch(e.target.value), 120);
});

renderTiles();
</script>
</body>
</html>
