<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Тесты ISSA</title>
<link rel="stylesheet" href="theme.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="nav.js"></script>
<script src="quiz_data.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #17212b);
    --text: var(--tg-theme-text-color, #fff);
    --hint: var(--tg-theme-hint-color, #8a9aa9);
    --card: var(--tg-theme-secondary-bg-color, #232e3c);
    --accent: var(--tg-theme-button-color, #50a8eb);
    --accent-text: var(--tg-theme-button-text-color, #fff);
    --border: rgba(255,255,255,.10);
    --ok: #4caf72; --bad: #e5544b;
  }
  /* Светлый системный режим: если Telegram НЕ передал тему (--tg-theme-*),
     берём светлый fallback, а не тёмный (иначе белый текст на белом фоне). */
  @media (prefers-color-scheme: light){
    :root{
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #1a1a1a);
      --hint: var(--tg-theme-hint-color, #7d8a99);
      --card: var(--tg-theme-secondary-bg-color, #f1f3f5);
      --accent: var(--tg-theme-button-color, #3390ec);
      --accent-text: var(--tg-theme-button-text-color, #ffffff);
      --border: rgba(0,0,0,.10);
    }
  }
  *{box-sizing:border-box}
  body{margin:0; padding:16px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); -webkit-tap-highlight-color:transparent}
  h1{font-size:19px; margin:0 0 2px}
  .sub{color:var(--hint); font-size:13px; margin:0 0 16px}
  .card{background:var(--card); border-radius:14px; padding:16px; margin-bottom:12px}
  .big{width:100%; padding:16px; font-size:16px; font-weight:600; border:none; border-radius:12px;
    background:var(--accent); color:var(--accent-text); cursor:pointer; margin-bottom:10px; text-align:left}
  .big small{display:block; font-weight:400; font-size:12px; opacity:.85; margin-top:3px}
  .ghost{background:transparent; color:var(--text); border:1px solid var(--border)}
  .topics{display:flex; flex-wrap:wrap; gap:8px}
  .topics button{flex:1 1 46%; padding:11px 8px; font-size:13px; border:1px solid var(--border);
    background:transparent; color:var(--text); border-radius:10px; cursor:pointer; text-align:left}
  .hidden{display:none !important}

  /* шапка квиза */
  .bar{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; font-size:13px; color:var(--hint)}
  .timer{font-variant-numeric:tabular-nums}
  .prog{height:6px; background:var(--border); border-radius:4px; overflow:hidden; margin-bottom:14px}
  .prog>i{display:block; height:100%; width:0; background:var(--accent); transition:width .25s}
  .topic-tag{display:inline-block; font-size:11px; color:var(--hint); background:var(--bg);
    border:1px solid var(--border); border-radius:20px; padding:2px 9px; margin-bottom:10px}
  .q{font-size:16px; line-height:1.45; margin:0 0 14px; font-weight:600}
  .opt{display:block; width:100%; text-align:left; padding:13px; margin-bottom:9px; font-size:15px;
    border:1px solid var(--border); background:var(--bg); color:var(--text); border-radius:11px; cursor:pointer}
  .opt:active{transform:scale(.995)}
  .opt.correct{border-color:var(--ok); background:rgba(76,175,114,.16)}
  .opt.wrong{border-color:var(--bad); background:rgba(229,84,75,.16)}
  .opt[disabled]{cursor:default; opacity:.95}
  .expl{font-size:13px; color:var(--hint); line-height:1.5; margin:6px 0 12px; padding:10px;
    background:var(--bg); border-radius:10px; border:1px solid var(--border)}
  /* источник-лампочка (только тренировка) */
  .src{margin:0 0 12px; font-size:13px; line-height:1.5}
  .src .lbl{color:var(--hint); display:block; margin-bottom:6px}
  .src a{display:inline-block; text-decoration:none; color:var(--accent);
    border:1px solid var(--border); border-radius:9px; padding:6px 11px; margin:0 6px 6px 0}
  .src a:active{transform:scale(.98)}
  .next{width:100%; padding:14px; font-size:15px; font-weight:600; border:none; border-radius:12px;
    background:var(--accent); color:var(--accent-text); cursor:pointer}
  .next.ghost{background:transparent; color:var(--text); border:1px solid var(--border); margin-bottom:9px}

  /* экзамен: навигация */
  .nav-row{display:flex; gap:10px; margin-top:4px}
  .navbtn{flex:1; padding:13px; font-size:14px; font-weight:600; border-radius:11px;
    border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer}
  .navbtn:disabled{opacity:.4; cursor:default}
  /* переключатель «лента номеров» — по умолчанию свёрнута, чтобы не скроллить */
  .gridToggle{display:flex; align-items:center; justify-content:space-between; gap:10px;
    width:100%; margin:10px 0 0; padding:11px 14px; font-size:13px; font-weight:600;
    border:1px solid var(--border); border-radius:11px; background:var(--card);
    color:var(--text); cursor:pointer}
  .gridToggle .meta{color:var(--hint); font-weight:400}
  .strip{display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin:10px 0 0;
    max-height:42vh; overflow:auto; -webkit-overflow-scrolling:touch}
  .strip.collapsed{display:none}
  .cell{width:30px; height:30px; border-radius:8px; border:1px solid var(--border);
    background:var(--bg); color:var(--hint); font-size:12px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; padding:0}
  .cell.answered{background:var(--ok); color:#fff; border-color:var(--ok)}
  .cell.current{outline:2px solid var(--accent); outline-offset:1px; color:var(--text)}
  .finishBtn{width:100%; padding:13px; font-size:15px; font-weight:700; border:none;
    border-radius:12px; background:var(--accent); color:var(--accent-text); cursor:pointer}

  /* результат */
  .score{font-size:40px; font-weight:800; text-align:center; margin:6px 0 0}
  .pct{text-align:center; color:var(--hint); margin:2px 0 12px}
  .verdict{text-align:center; font-size:18px; font-weight:700; margin-bottom:14px}
  .verdict.pass{color:var(--ok)} .verdict.fail{color:var(--bad)}
  .review h3{font-size:14px; margin:14px 0 8px}
  .miss{font-size:13px; padding:10px; border:1px solid var(--border); border-radius:10px; margin-bottom:8px; line-height:1.45}
  .miss .t{color:var(--hint); font-size:11px}
  .miss .a{color:var(--ok)}
  /* фидбек по темам */
  .fb{margin:4px 0 6px}
  .fbrow{display:flex; align-items:center; gap:8px; font-size:13px; margin-bottom:7px}
  .fbrow .name{flex:0 0 38%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .fbrow .meter{flex:1; height:8px; background:var(--border); border-radius:5px; overflow:hidden}
  .fbrow .meter>i{display:block; height:100%; border-radius:5px}
  .fbrow .v{flex:0 0 auto; color:var(--hint); font-variant-numeric:tabular-nums; min-width:48px; text-align:right}
  .recs{background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px; margin:6px 0 4px}
  .recs .lbl{font-size:13px; margin-bottom:8px}
  .recs a{display:inline-block; text-decoration:none; color:var(--accent);
    border:1px solid var(--border); border-radius:9px; padding:6px 11px; margin:0 6px 6px 0; font-size:13px}
  .foot{color:var(--hint); font-size:11px; text-align:center; margin-top:18px}
</style>
</head>
<body>

<!-- ГЛАВНЫЙ ЭКРАН -->
<section id="home">
  <h1>⚓ Тесты ISSA</h1>
  <p class="sub">Inshore Skipper + SRC · банк <span id="qcount">…</span> вопросов</p>

  <!-- баннер продолжения незавершённого теста (показывается, если есть сессия) -->
  <div class="card hidden" id="resumeCard" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap">
    <div style="flex:1 1 100%; font-size:14px">⏸ Есть незавершённый тест: <b><span id="resumeInfo"></span></b></div>
    <button class="next" id="resumeBtn" style="flex:1; min-width:130px">▶️ Продолжить</button>
    <button class="next ghost" id="resumeDrop" style="flex:1; min-width:130px; margin:0">🗑 Начать заново</button>
  </div>

  <button class="big" id="startExam">📝 Экзамен
    <small id="examSub">100 вопросов · таймер · проходной балл</small></button>
  <button class="big ghost" id="startRandom">🎯 Тренировка — случайные
    <small>Вопросы вперемешку, с пояснениями</small></button>
  <button class="big ghost" id="startTopic">📚 Тренировка по темам
    <small>Выбрать тему</small></button>

  <div class="card hidden" id="topicCard">
    <div class="topics" id="topics"></div>
  </div>
  <p class="foot">Учебный тренажёр. Не является официальным материалом ISSA и не содержит экзаменационных ключей.</p>
</section>

<!-- ЭКРАН ВОПРОСА -->
<section id="quiz" class="hidden">
  <div class="bar">
    <span id="counter">1 / 10</span>
    <span class="timer hidden" id="timer">00:00</span>
    <span id="liveScore"></span>
  </div>
  <div class="prog"><i id="progBar"></i></div>
  <span class="topic-tag" id="qtopic"></span>
  <p class="q" id="qtext"></p>
  <div id="opts"></div>
  <div class="expl hidden" id="expl"></div>
  <div class="src hidden" id="src"></div>

  <!-- тренировка: пропустить (до ответа) / Далее (после ответа) -->
  <button class="next ghost hidden" id="trainSkip">Пропустить →</button>
  <button class="next hidden" id="nextBtn">Далее →</button>

  <!-- экзамен: свободная навигация -->
  <div id="examNav" class="hidden">
    <div class="nav-row">
      <button class="navbtn" id="prevBtn">← Назад</button>
      <button class="navbtn" id="skipBtn">Пропустить →</button>
    </div>
    <button class="gridToggle" id="gridToggle" type="button">
      <span>🗒 Список вопросов</span><span class="meta" id="gridMeta"></span>
    </button>
    <div class="strip collapsed" id="strip"></div>
    <button class="finishBtn" id="finishBtn">Завершить тест</button>
  </div>
</section>

<!-- ЭКРАН РЕЗУЛЬТАТА -->
<section id="result" class="hidden">
  <div class="card">
    <div class="score" id="rScore"></div>
    <div class="pct" id="rPct"></div>
    <div class="verdict" id="rVerdict"></div>
    <button class="next" id="sendBtn">📤 Сохранить результат в боте</button>
  </div>
  <div id="feedback"></div>
  <div class="review" id="review"></div>
  <button class="big ghost" id="againBtn">↩️ В меню</button>
  <p class="foot" id="sentNote"></p>
</section>

<script>
"use strict";
const tg = window.Telegram?.WebApp;
if (tg){ tg.ready(); tg.expand(); }

const DATA = window.QUIZ_DATA || {questions:[], topics:[], examSize:100, passPercent:75};
const ALL = DATA.questions;
const KTITLES = DATA.konspekt || {};   // ключ темы конспекта → название кнопки

// ссылки-источники для вопроса: [{key,title}] из q.src, отфильтрованные по справочнику
function srcLinks(q){
  return (q.src || []).filter(k => KTITLES[k]).map(k => ({key:k, title:KTITLES[k]}));
}
document.getElementById("qcount").textContent = ALL.length;
document.getElementById("examSub").textContent =
  `${Math.min(DATA.examSize, ALL.length)} вопросов · таймер · проходной балл ${DATA.passPercent}%`;

// ── утилиты ──
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
const byId = Object.fromEntries(ALL.map(q=>[q.id,q]));
const show = id => document.getElementById(id).classList.remove("hidden");
const hide = id => document.getElementById(id).classList.add("hidden");
const esc = s => String(s).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

// ── сохранение незавершённого теста (localStorage) ──
// Чтобы при случайном закрытии Mini App или потере сети не терять прогресс
// длинного теста. Храним только id вопросов и ответы — достаточно для восстановления.
const LS_KEY = "issa_quiz_session_v1";
function saveSession(){
  if (!S || S.finished) return;
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      mode: S.mode, isExam: S.isExam, idx: S.idx,
      ids: S.queue.map(q => q.id),
      order: S.order, answers: S.answers, locked: S.locked,
      startTs: S.startTs, ts: Date.now(),
    }));
  } catch (e) {}
}
function clearSession(){ try { localStorage.removeItem(LS_KEY); } catch (e) {} }
function loadSession(){
  try {
    const raw = localStorage.getItem(LS_KEY); if (!raw) return null;
    const s = JSON.parse(raw);
    // восстановление валидно только если все вопросы ещё существуют в банке
    const queue = s.ids.map(id => byId[id]);
    if (queue.some(q => !q) || !s.ids.length) { clearSession(); return null; }
    return { ...s, queue };
  } catch (e) { return null; }
}

// ── состояние ──
// answers[i] = выбранный индекс варианта или null (не отвечено).
// answered[i] = true, если в тренировке уже зафиксирован ответ (lock).
let S = null;

function startQuiz(mode, isExam, queue){
  S = { mode, isExam, queue, idx:0,
        // order[i] — перестановка индексов вариантов вопроса queue[i].
        // Показываем options[order[i][k]]; «правильная» позиция — где order=answer.
        // Это нейтрализует перекос (ответ всегда B / самый длинный) без правки банка.
        order: queue.map(q => shuffle(q.options.map((_,k)=>k))),
        answers: new Array(queue.length).fill(null),  // хранит ИСХОДНЫЙ индекс ответа
        locked: new Array(queue.length).fill(false),
        startTs:Date.now(), timerH:null };
  hide("home"); hide("result"); show("quiz");
  document.getElementById("timer").classList.toggle("hidden", !isExam);
  document.getElementById("examNav").classList.toggle("hidden", !isExam);
  document.getElementById("liveScore").textContent = isExam ? "" : "✔ 0";
  if (isExam){ tickTimer(); S.timerH = setInterval(tickTimer, 1000); }
  renderQ();
}

function tickTimer(){
  const s = Math.floor((Date.now()-S.startTs)/1000);
  const mm = String(Math.floor(s/60)).padStart(2,"0");
  const ss = String(s%60).padStart(2,"0");
  document.getElementById("timer").textContent = `${mm}:${ss}`;
}

function answeredCount(){ return S.answers.filter(a => a !== null).length; }

function renderQ(){
  const q = S.queue[S.idx];
  document.getElementById("counter").textContent = `Вопрос ${S.idx+1} / ${S.queue.length}`;
  document.getElementById("progBar").style.width = `${(answeredCount()/S.queue.length)*100}%`;
  document.getElementById("qtopic").textContent = q.topic;
  document.getElementById("qtext").innerHTML = esc(q.q);
  hide("expl");
  hide("src");

  const sel = S.answers[S.idx];           // ИСХОДНЫЙ индекс выбранного (или null)
  const order = S.order[S.idx];           // порядок показа: позиция k → исходный orig
  const box = document.getElementById("opts");
  box.innerHTML = "";
  order.forEach((orig)=>{
    const b = document.createElement("button");
    b.className = "opt"; b.innerHTML = esc(q.options[orig]);
    if (S.isExam){
      // экзамен: подсветка выбора, без раскрытия правильности; можно менять
      if (sel === orig) b.classList.add("correct");
      b.onclick = ()=> chooseExam(orig);
    } else {
      // тренировка: фиксируем ответ и раскрываем правильный
      if (S.locked[S.idx]){
        b.disabled = true;
        if (orig === q.answer) b.classList.add("correct");
        if (orig === sel && sel !== q.answer) b.classList.add("wrong");
      } else {
        b.onclick = ()=> answerTraining(orig);
      }
    }
    box.appendChild(b);
  });

  if (S.isExam){
    hide("nextBtn"); hide("trainSkip");
    renderExamNav();
  } else {
    const last = S.idx+1 >= S.queue.length;
    if (S.locked[S.idx]){
      // после ответа — пояснение + кнопка Далее
      hide("trainSkip");
      const ok = sel === q.answer;
      if (q.expl){
        const e = document.getElementById("expl");
        e.innerHTML = (ok ? "✅ Верно. " : "❌ Неверно. ") + esc(q.expl);
        show("expl");
      }
      // 💡 источник: где изучить тему (конспект + библиотека). Только в тренировке.
      const links = srcLinks(q);
      if (links.length){
        const s = document.getElementById("src");
        s.innerHTML = '<span class="lbl">💡 Где изучить:</span>'
          + links.map(l => `<a href="konspekt.html#${encodeURIComponent(l.key)}">📖 ${esc(l.title)}</a>`).join("")
          + '<a href="book.html">📚 Библиотека</a>';
        show("src");
      }
      const nb = document.getElementById("nextBtn");
      nb.textContent = last ? "Завершить" : "Далее →";
      show("nextBtn");
    } else {
      // до ответа — можно пропустить (без раскрытия правильного)
      hide("nextBtn");
      const sk = document.getElementById("trainSkip");
      sk.textContent = last ? "Пропустить и завершить" : "Пропустить →";
      show("trainSkip");
    }
  }
  saveSession();   // сохраняем незавершённый тест после каждого шага
}

function renderExamNav(){
  document.getElementById("prevBtn").disabled = (S.idx === 0);
  const skip = document.getElementById("skipBtn");
  const last = S.idx === S.queue.length - 1;
  const answered = S.answers[S.idx] !== null;
  skip.textContent = last ? (answered ? "Готово ✓" : "Дальше →")
                          : (answered ? "Далее →" : "Пропустить →");
  skip.disabled = last;
  // лента номеров (по умолчанию свёрнута; раскрывается кнопкой gridToggle)
  const strip = document.getElementById("strip");
  strip.innerHTML = "";
  S.queue.forEach((_, i)=>{
    const c = document.createElement("button");
    c.className = "cell" + (S.answers[i]!==null ? " answered":"") + (i===S.idx ? " current":"");
    c.textContent = i+1;
    c.onclick = ()=>{ S.idx = i; strip.classList.add("collapsed"); renderQ(); };
    strip.appendChild(c);
  });
  // компактная сводка на кнопке-переключателе
  document.getElementById("gridMeta").textContent =
    `вопрос ${S.idx+1}/${S.queue.length} · отвечено ${answeredCount()}`;
  const fin = document.getElementById("finishBtn");
  const left = S.queue.length - answeredCount();
  fin.textContent = left ? `Завершить (без ответа: ${left})` : "Завершить тест";
}

// переключатель ленты номеров (вешаем один раз)
document.getElementById("gridToggle").onclick = ()=>{
  document.getElementById("strip").classList.toggle("collapsed");
};

// экзамен: выбрать/сменить вариант (без блокировки)
function chooseExam(i){
  S.answers[S.idx] = i;
  haptic("select");
  renderQ();
}

// тренировка: зафиксировать ответ
function answerTraining(i){
  S.answers[S.idx] = i;
  S.locked[S.idx] = true;
  const ok = i === S.queue[S.idx].answer;
  document.getElementById("liveScore").textContent =
    `✔ ${S.queue.filter((q,k)=>S.locked[k] && S.answers[k]===q.answer).length}`;
  haptic(ok ? "light" : "rigid");
  renderQ();
}

// тренировка: Далее
document.getElementById("nextBtn").onclick = ()=>{
  if (S.idx+1 >= S.queue.length){ finish(); return; }
  S.idx++; renderQ();
};

// тренировка: Пропустить (без ответа → засчитается как пропуск)
document.getElementById("trainSkip").onclick = ()=>{
  if (S.idx+1 >= S.queue.length){ finish(); return; }
  S.idx++; renderQ();
};

// экзамен: назад / пропустить-далее / завершить
document.getElementById("prevBtn").onclick = ()=>{ if (S.idx>0){ S.idx--; renderQ(); } };
document.getElementById("skipBtn").onclick = ()=>{ if (S.idx+1 < S.queue.length){ S.idx++; renderQ(); } };
document.getElementById("finishBtn").onclick = ()=>{
  const left = S.queue.length - answeredCount();
  if (left > 0 && !confirm(`Без ответа осталось ${left}. Завершить тест? Их зачтут как ошибки.`)) return;
  finish();
};

// фидбек: разбивка по темам + рекомендации со ссылками в конспект
function renderFeedback(pct){
  const box = document.getElementById("feedback");
  // агрегируем по теме вопроса
  const byTopic = {};
  S.queue.forEach((q,i)=>{
    const t = byTopic[q.topic] || (byTopic[q.topic] = {total:0, ok:0, srcKeys:new Set()});
    t.total++;
    if (S.answers[i] === q.answer) t.ok++;
    (q.src||[]).forEach(k => t.srcKeys.add(k));
  });
  const rows = Object.entries(byTopic).map(([topic,t])=>({
    topic, ...t, pct: Math.round(t.ok/t.total*100), srcKeys:[...t.srcKeys]
  })).sort((a,b)=> a.pct - b.pct || b.total - a.total);   // слабые сверху

  const color = p => p>=75 ? "var(--ok)" : p>=50 ? "#e0a13a" : "var(--bad)";
  let html = '<div class="card"><h3 style="margin:0 0 10px">📊 По темам</h3><div class="fb">';
  html += rows.map(r=>`
    <div class="fbrow">
      <span class="name" title="${esc(r.topic)}">${esc(r.topic)}</span>
      <span class="meter"><i style="width:${r.pct}%;background:${color(r.pct)}"></i></span>
      <span class="v">${r.ok}/${r.total}</span>
    </div>`).join("");
  html += '</div>';

  // рекомендации: слабые темы (<75%), уникальные ключи конспекта
  const weak = rows.filter(r => r.pct < 75);
  if (weak.length){
    const seen = new Set(), recs = [];
    weak.forEach(r => r.srcKeys.forEach(k => {
      if (KTITLES[k] && !seen.has(k)){ seen.add(k); recs.push({key:k, title:KTITLES[k]}); }
    }));
    const names = weak.map(r=>r.topic).join(", ");
    html += `<div class="recs"><div class="lbl">📌 Стоит повторить: <b>${esc(names)}</b></div>`
      + recs.map(l=>`<a href="konspekt.html#${encodeURIComponent(l.key)}">📖 ${esc(l.title)}</a>`).join("")
      + '<a href="book.html">📚 Библиотека</a></div>';
  } else {
    html += `<div class="recs"><div class="lbl">💪 Слабых тем нет — отличная подготовка!</div></div>`;
  }
  html += '</div>';
  box.innerHTML = html;
}

function finish(){
  if (S.timerH){ clearInterval(S.timerH); S.timerH=null; }
  S.finished = true; clearSession();   // тест завершён — сохранённую сессию убираем
  hide("quiz"); show("result");
  document.getElementById("progBar").style.width = "100%";
  // итог считаем из answers (неотвеченные = ошибки)
  S.results = S.queue.map((q,i)=> [q.id, S.answers[i] === q.answer ? 1 : 0]);
  S.correct = S.results.filter(([,ok])=>ok).length;
  const total = S.queue.length, correct = S.correct;
  const pct = total ? Math.round(correct/total*100) : 0;
  document.getElementById("rScore").textContent = `${correct} / ${total}`;
  const secs = Math.floor((Date.now()-S.startTs)/1000);
  const tstr = S.isExam ? ` · ⏱ ${Math.floor(secs/60)}м ${secs%60}с` : "";
  document.getElementById("rPct").textContent = `${pct}%${tstr}`;

  const v = document.getElementById("rVerdict");
  if (S.isExam){
    const passed = pct >= DATA.passPercent;
    v.textContent = passed ? "✅ СДАНО" : "❌ НЕ СДАНО";
    v.className = "verdict " + (passed ? "pass" : "fail");
  } else {
    v.textContent = "🎯 Тренировка завершена";
    v.className = "verdict";
  }

  // ── фидбек по темам: где сильно, где слабо + что повторить ──
  renderFeedback(pct);

  // разбор ошибок
  const wrong = S.results.filter(([,ok])=>!ok).map(([id])=>byId[id]);
  const rev = document.getElementById("review");
  if (wrong.length){
    rev.innerHTML = `<h3>Разбор ошибок (${wrong.length})</h3>` + wrong.map(q=>`
      <div class="miss">
        <div class="t">${esc(q.topic)}</div>
        <div>${esc(q.q)}</div>
        <div class="a">✔️ ${esc(q.options[q.answer])}</div>
      </div>`).join("");
  } else {
    rev.innerHTML = `<div class="miss" style="border-color:var(--ok)">🎉 Без ошибок!</div>`;
  }
  document.getElementById("sentNote").textContent = "";
  haptic(S.isExam ? "warning" : "success");
}

// отправка компактного результата в бота
document.getElementById("sendBtn").onclick = ()=>{
  const payload = {
    t: "quiz",
    mode: S.mode,                 // "exam" | "random" | "topic:<...>"
    n: S.queue.length,
    ok: S.correct,
    results: S.results,          // [[id, 0|1], ...]
    secs: Math.floor((Date.now()-S.startTs)/1000),
  };
  // payload компактный: id'шники короткие, лимит sendData ~4 КБ хватает на 100.
  const json = JSON.stringify(payload);
  if (tg && tg.sendData){
    tg.sendData(json);          // бот получит Message.web_app_data и закроет окно
  } else {
    document.getElementById("sentNote").textContent =
      "Открой через кнопку в боте, чтобы сохранить результат.";
  }
};

// ── навигация по меню ──
document.getElementById("startExam").onclick = ()=>{
  const size = Math.min(DATA.examSize, ALL.length);
  startQuiz("exam", true, shuffle(ALL).slice(0, size));
};
document.getElementById("startRandom").onclick = ()=>{
  const n = Math.min(20, ALL.length);
  startQuiz("random", false, shuffle(ALL).slice(0, n));
};
document.getElementById("startTopic").onclick = ()=>{
  const card = document.getElementById("topicCard");
  card.classList.toggle("hidden");
  const box = document.getElementById("topics");
  if (box.children.length) return;
  DATA.topics.forEach(t=>{
    const cnt = ALL.filter(q=>q.topic===t).length;
    const b = document.createElement("button");
    b.innerHTML = `${esc(t)}<br><span style="color:var(--hint);font-size:11px">${cnt} вопр.</span>`;
    b.onclick = ()=>{
      const pool = shuffle(ALL.filter(q=>q.topic===t)).slice(0, Math.min(20, cnt));
      startQuiz("topic:"+t, false, pool);
    };
    box.appendChild(b);
  });
};
function toMenu(){
  if (S && S.timerH) clearInterval(S.timerH);
  clearSession();   // явный выход в меню = отказ от теста, сохранять нечего
  S = null;
  hide("quiz"); hide("result"); show("home");
  document.getElementById("topicCard").classList.add("hidden");
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("review").innerHTML = "";
  renderResumeBanner();   // вдруг есть другая сохранённая сессия — покажем снова
}
document.getElementById("againBtn").onclick = toMenu;

// Системная «Назад» Telegram: из теста/результата вернуть в меню, иначе на home.
window.__navBack = () => {
  const inQuiz = !document.getElementById("quiz").classList.contains("hidden");
  const inResult = !document.getElementById("result").classList.contains("hidden");
  if (inQuiz || inResult){ toMenu(); return true; }
  return false;
};

// ── восстановление незавершённого теста ──
function resumeQuiz(){
  const s = loadSession();
  if (!s) return;
  S = { mode:s.mode, isExam:s.isExam, queue:s.queue, idx:s.idx,
        order:s.order, answers:s.answers, locked:s.locked,
        startTs:s.startTs, timerH:null };
  hide("home"); hide("result"); show("quiz");
  document.getElementById("timer").classList.toggle("hidden", !s.isExam);
  document.getElementById("examNav").classList.toggle("hidden", !s.isExam);
  document.getElementById("liveScore").textContent = s.isExam ? ""
    : `✔ ${S.queue.filter((q,k)=>S.locked[k] && S.answers[k]===q.answer).length}`;
  if (s.isExam){ tickTimer(); S.timerH = setInterval(tickTimer, 1000); }
  renderQ();
}

const MODE_LABEL = m => m==="exam" ? "Экзамен"
  : m==="random" ? "Тренировка" : m && m.startsWith("topic:") ? "Тема: "+m.slice(6) : "Тест";

function renderResumeBanner(){
  const s = loadSession();
  const card = document.getElementById("resumeCard");
  if (!s){ card.classList.add("hidden"); return; }
  const done = s.answers.filter(a => a !== null).length;
  document.getElementById("resumeInfo").textContent =
    `${MODE_LABEL(s.mode)} · ${done}/${s.ids.length}`;
  card.classList.remove("hidden");
}
document.getElementById("resumeBtn").onclick = resumeQuiz;
document.getElementById("resumeDrop").onclick = () => {
  clearSession();
  document.getElementById("resumeCard").classList.add("hidden");
};

// при открытии страницы — предложить продолжить, если есть сессия
renderResumeBanner();
</script>
